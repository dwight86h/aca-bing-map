
<!DOCTYPE html><!DOCTYPE-scale=1.0" />

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: #ffffff;
      padding: 12px 14px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      font-family: Arial, sans-serif;
      font-size: 14px;
      max-width: 420px;
    }

    .panel h2 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    .controls input,
    .controls select {
      width: 100%;
      padding: 6px;
      margin-bottom: 6px;
    }

    .controls button {
      padding: 6px 10px;
      margin-right: 4px;
      cursor: pointer;
    }

    .progress {
      height: 6px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 6px;
    }

    .progress div {
      height: 6px;
      width: 0%;
      background: #1976d2;
    }

    .note {
      font-size: 12px;
      color: #555;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="panel">
    <h2>ACA Members — Interactive Map</h2>

    <div class="controls">
      <input id="search" type="text" placeholder="Search Organisation or Camp name" />

      <select id="typeFilter">
        <option value="">All member types</option>
        <option>Camp</option>
        <option>Activity Provider</option>
        <option>Service Provider</option>
        <option>Individual</option>
      </select>

      <button id="startBtn">Start geocoding</button>
      <button id="stopBtn">Stop</button>
    </div>

    <div class="progress">
      <div id="progressBar"></div>
    </div>

    <div class="note">
      Requires a Bing Maps key.<br/>
      Open this page with <code>?key=YOUR_BING_MAPS_KEY</code>
    </div>
  </div>

  <script>
    // === PLACEHOLDER DATA ===
    // This will still load the map even before geocoding
    const DATA = [];

    const params = new URLSearchParams(window.location.search);
    const BING_KEY = params.get("key");

    let map, infobox, clusterLayer;
    let abort = false;

    function initMap() {
      if (!BING_KEY) {
        alert("Please add your Bing Maps key to the URL: ?key=YOUR_BING_MAPS_KEY");
      }

      map = new Microsoft.Maps.Map(document.getElementById("map"), {
        center: new Microsoft.Maps.Location(-25.2744, 133.7751),
        zoom: 4
      });

      infobox = new Microsoft.Maps.Infobox(map.getCenter(), { visible: false });
      infobox.setMap(map);

      Microsoft.Maps.loadModule("Microsoft.Maps.Clustering", function () {
        clusterLayer = new Microsoft.Maps.ClusterLayer([]);
        map.layers.insert(clusterLayer);
      });
    }
  </script>

  <script
    src="https://www.bing.com/api/maps/mapcontrol?callback=initMap"
    async
    defer>
  </script>
</body>
</html>
