<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ACA Members — Interactive Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.js
  https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.css

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      z-index: 1000;
      font-family: Arial, sans-serif;
      font-size: 14px;
      max-width: 360px;
    }
  </style>
</head>

<body>
<div id="map"></div>

<div class="panel">
  <strong>ACA Members — Interactive Map</strong><br><br>
  <button onclick="startGeocoding()">Start geocoding</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const AZURE_KEY = params.get("key");

if (!AZURE_KEY) {
  alert("Open this page with ?key=YOUR_AZURE_MAPS_KEY");
}

let map;
let datasource;

map = new atlas.Map("map", {
  center: [133.7751, -25.2744],
  zoom: 4,
  authOptions: {
    authType: "subscriptionKey",
    subscriptionKey: AZURE_KEY
  }
});

map.events.add("ready", () => {
  datasource = new atlas.source.DataSource();
  map.sources.add(datasource);

  map.layers.add(new atlas.layer.BubbleLayer(datasource, null, {
    radius: 6,
    color: "#1976d2"
  }));
});

async function startGeocoding() {
  const res = await fetch("aca_members.csv");
  const text = await res.text();
  const rows = text.split("\n").slice(1);

  for (const row of rows) {
    const cols = row.split(",");
    const address = cols[3];

    if (!address) continue;

    const url = `https://atlas.microsoft.com/search/address/json?api-version=1.0&subscription-key=${AZURE_KEY}&query=${encodeURIComponent(address)}`;
    const geo = await fetch(url).then(r => r.json());

    if (geo.results && geo.results.length > 0) {
      const p = geo.results[0].position;
      datasource.add(new atlas.data.Feature(
        new atlas.data.Point([p.lon, p.lat])
      ));
    }

    await new Promise(r => setTimeout(r, 300));
  }
}
</script>
</body>
</html>
